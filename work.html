<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&display=swap');
        body { background-color: #00000A; color: white; margin: 0; font-family: 'Audiowide', sans-serif; }
        .font-audiowide { font-family: 'Audiowide', sans-serif; }
        .font-normal-sans { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        
        /* The "Slide in from bottom" entrance animation */
        #page-slide-wrapper {
            transform: translateY(100vh);
            animation: slideUpEnter 0.8s cubic-bezier(0.77, 0, 0.17, 1) forwards;
        }
        @keyframes slideUpEnter {
            to { transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        /* Expanded Top Nav for Edge Alignment */
        header#top-nav {
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav .max-w-7xl {
            max-width: 100% !important;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav nav {
            gap: 0.7rem !important;
        }

        /* =========================================
           STYLE 11: SMPTE BROADCAST GLITCH BUTTONS
           (For Logo and CV Download)
           ========================================= */
        .btn-smpte-glitch {
            position: relative; border-radius: 8px; padding: 2px;
            background: #050012; overflow: hidden; display: inline-flex; transition: transform 0.3s ease;
        }
        .btn-smpte-glitch::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(#ffffff 0deg 4deg, #fdff00 4deg 8deg, #00fffc 8deg 12deg, #00ff00 12deg 16deg, #ff00fe 16deg 20deg, #ff0000 20deg 24deg, #0000fc 24deg 28deg, transparent 28deg 40deg);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-smpte-glitch:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        .btn-smpte-glitch:hover::before { animation: spin 0.2s steps(5) infinite; }
        .btn-gradient-inner { position: relative; z-index: 1; background: #050012; overflow: hidden; transition: none; border-radius: 6px; }
        .btn-smpte-glitch:hover .btn-gradient-inner { background: linear-gradient(to right, #ffffff 0% 14.28%, #fdff00 14.28% 28.57%, #00fffc 28.57% 42.85%, #00ff00 42.85% 57.14%, #ff00fe 57.14% 71.42%, #ff0000 71.42% 85.71%, #0000fc 85.71% 100%); color: #050012; font-weight: 900; }
        .btn-smpte-glitch:hover .btn-gradient-inner span.relative { text-shadow: 2px 2px 0px rgba(255,255,255,0.9), -2px -2px 0px rgba(255,255,255,0.9); mix-blend-mode: hard-light; }
        .btn-smpte-glitch .glitch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #ffffff 0% 14.28%, #fdff00 14.28% 28.57%, #00fffc 28.57% 42.85%, #00ff00 42.85% 57.14%, #ff00fe 57.14% 71.42%, #ff0000 71.42% 85.71%, #0000fc 85.71% 100%); opacity: 0; z-index: 2; pointer-events: none; filter: contrast(1.5) saturate(1.5); }
        .btn-smpte-glitch:hover .glitch-layer { opacity: 1; animation: smpte-tear 0.3s infinite linear alternate-reverse; }
        .btn-smpte-glitch:hover .btn-gradient-inner::after { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(transparent 0, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px); z-index: 3; pointer-events: none; animation: static-flicker 0.05s infinite; }
        
        @keyframes smpte-tear { 0% { clip-path: inset(10% -20% 80% -20%); transform: translateX(8px); } 20% { clip-path: inset(80% -20% 5% -20%); transform: translateX(-8px); } 40% { clip-path: inset(40% -20% 30% -20%); transform: translateX(12px); } 60% { clip-path: inset(15% -20% 60% -20%); transform: translateX(-6px); } 80% { clip-path: inset(60% -20% 10% -20%); transform: translateX(10px); } 100% { clip-path: inset(30% -20% 50% -20%); transform: translateX(-12px); } }
        @keyframes static-flicker { 0% { background-position: 0px 0px; } 50% { background-position: 2px -2px; } 100% { background-position: -2px 2px; } }

        /* =========================================
           STYLE 16: CHROMATIC OVERLOAD
           (For Navbar Links)
           ========================================= */
        .btn-chromatic {
            position: relative;
            background: #000000;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 8px 24px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            cursor: pointer;
            z-index: 1;
            overflow: hidden;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }
        .btn-chromatic::before, .btn-chromatic::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            background: #000000;
            z-index: 2;
        }
        .btn-chromatic::before { 
            color: #00ff00; 
            text-shadow: -2px 0 #00fffc, 2px 2px #fdff00; 
        }
        .btn-chromatic::after { 
            color: #ff0000; 
            text-shadow: 2px 0 #ff00fe, -2px -2px #0000fc; 
        }
        .btn-chromatic:hover {
            border-color: transparent !important; 
            color: transparent !important; 
            box-shadow: -4px -4px 0 rgba(0, 255, 204, 0.8), 4px 4px 0 rgba(255, 0, 127, 0.8); 
        }
        .btn-chromatic:hover::before {
            opacity: 1;
            animation: chrom-glitch-1 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        }
        .btn-chromatic:hover::after {
            opacity: 1;
            animation: chrom-glitch-2 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite reverse;
        }
        .btn-chromatic:active {
            box-shadow: -1px -1px 0 rgba(0, 255, 204, 0.8), 1px 1px 0 rgba(255, 0, 127, 0.8);
            transform: translate(2px, 2px);
        }

        @keyframes chrom-glitch-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); }
        }
        @keyframes chrom-glitch-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
            60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); }
            80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
            100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); }
        }

        .footer-name { font-size: clamp(2rem, 4vw, 4rem); line-height: 1.05; margin: 0; }
        footer { font-size: 1.1rem; }
        footer p, footer a, footer span, footer h2, footer h3, footer div { font-size: 1.1rem; }
        footer .text-xs { font-size: 1rem; }
        
        /* Mobile Burger Menu & Overlay CSS */
        .nav-toggle {
            display: none; font-size: 1.5rem; color: #00ffcc;
            background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffcc;
            border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; line-height: 1;
        }
        .nav-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px); z-index: 49;
        }
        .nav-overlay.active { display: block; }

        @media (max-width: 1024px) {
            .footer-name { font-size: clamp(1.8rem, 5vw, 3.5rem); }
            #top-nav nav { gap: 0.5rem !important; }
        }

        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            #top-nav .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; right: 0; 
                background: rgba(0, 0, 10, 0.95); backdrop-filter: blur(10px);
                flex-direction: column; align-items: center; padding: 2rem 0; 
                border-top: 1px solid #1a1f24; border-bottom: 2px solid #00ffcc;
                z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            }
            #top-nav .nav-links.open { display: flex !important; }
            .footer-name { font-size: clamp(1.8rem, 6vw, 3.3rem); }
        }
        
        @media (min-width: 769px) {
            #top-nav .nav-links { display: contents; }
        }

        /* Page Transition Curtain */
        #page-transition-curtain {
            position: fixed; inset: 0; background-color: #00000A; z-index: 49;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.17, 1); pointer-events: none;
        }
        .curtain-active { transform: translateY(0) !important; pointer-events: auto !important; }

        /* Perspective Footer Grid */
        .perspective-grid-footer {
            background-image: linear-gradient(transparent 95%, rgba(255, 204, 0, 0.7) 100%), linear-gradient(90deg, transparent 95%, rgba(255, 204, 0, 0.7) 100%);
            background-size: 80px 50px;
            transform: perspective(400px) rotateX(60deg) scaleY(1.5);
            transform-origin: bottom;
            -webkit-mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
            mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
        }

        /* --- WORK PAGE SPECIFIC STYLES --- */

        /* Warping Image Base Styles */
        #warp-container {
            transition: transform 0.1s linear, border-radius 0.1s linear, filter 0.1s linear;
            will-change: transform, border-radius, filter;
            /* Using standard shadow, not too crazy */
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Highlight Scroll Words - Replaced in place */
        .scroll-word {
            position: absolute;
            left: 0;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity, filter;
            pointer-events: none; /* Let clicks pass through */
        }
        .scroll-word.enter {
            opacity: 0;
            transform: translateY(80px);
            filter: blur(4px);
            color: white;
        }
        .scroll-word.active {
            opacity: 1;
            transform: translateY(0);
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            filter: blur(0px);
            z-index: 10;
        }
        .scroll-word.exit {
            opacity: 0;
            transform: translateY(-80px);
            filter: blur(4px);
            color: white;
        }

        /* Project Grid Block (Matches Wireframe exactly) */
        .project-block-img {
            background-color: #111; /* Dark base behind image */
            border-radius: 8px; /* Slightly sharper corners */
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            border: 4px solid transparent; /* Transparent border for structure */
        }
        
        .project-block-img:hover {
            border-color: #3b82f6; /* Bright blue wireframe border */
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }
        
        .project-block-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85; /* Show the actual image clearly */
            transition: opacity 0.3s ease, transform 0.5s ease;
        }
        
        .project-block-img:hover img {
            opacity: 1; /* Fully bright on hover */
            transform: scale(1.03); /* Subtle inner zoom */
        }

        /* Modal Styles matching wireframe exactly */
        #project-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 10, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        #project-modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content-box {
            background-color: #e2e8f0; /* Light grey background from wireframe */
            border: 6px solid #4f46e5; /* Thick blue/purple border from wireframe */
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            color: #1a202c;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .modal-scroll-area {
            padding: 2.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        /* Wireframe exact scrollbar */
        .modal-scroll-area::-webkit-scrollbar {
            width: 12px;
        }
        .modal-scroll-area::-webkit-scrollbar-track {
            background: #cbd5e1;
            border-radius: 0 4px 4px 0;
        }
        .modal-scroll-area::-webkit-scrollbar-thumb {
            background: #000000; /* Black scrollbar thumb */
            border-radius: 6px;
            border: 2px solid #cbd5e1;
        }
        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2.5rem;
            color: #1a202c;
            cursor: pointer;
            z-index: 10;
            line-height: 1;
            transition: color 0.2s;
        }
        .modal-close-btn:hover {
            color: #4f46e5;
        }
        .modal-media-placeholder {
            width: 100%;
            height: 350px;
            background-color: #71717a; /* Darker grey box from wireframe */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: 300;
        }
        .modal-small-media {
            width: 100%;
            max-width: 250px;
            height: 200px;
            background-color: #71717a;
            align-self: flex-end;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>

    <script src="transition.js"></script>
    <script>
        // --- WORK PAGE SCROLL & WARP LOGIC ---
        
        const warpSection = document.getElementById('scroll-warp-section');
        const warpContainer = document.getElementById('warp-container');
        const scrollWords = document.querySelectorAll('.scroll-word');
        const totalWords = scrollWords.length;

        // 1. Setup Scroll Event to control both Word Swapping and Image Warping
        window.addEventListener('scroll', () => {
            if(!warpSection || !warpContainer) return;
            
            const rect = warpSection.getBoundingClientRect();
            const sectionTop = rect.top;
            const sectionHeight = rect.height;
            const windowHeight = window.innerHeight;
            
            // Calculate progress (0 to 1) ONLY while the section is locked (sticky) at the top of viewport
            let progress = 0;
            if (sectionTop <= 0) {
                // The amount of pixel scrolling available before it un-sticks
                const scrollableDistance = sectionHeight - windowHeight;
                progress = Math.abs(sectionTop) / scrollableDistance;
            }
            
            // Clamp progress between 0 and 1 strictly
            progress = Math.max(0, Math.min(1, progress));

            // --- Logic A: Word Swapping ---
            const segment = 1 / totalWords; 
            // Determine which word should be active based on progress fraction
            let activeIndex = Math.min(totalWords - 1, Math.floor(progress / segment));

            scrollWords.forEach((word, index) => {
                if (index === activeIndex) {
                    word.className = 'font-normal-sans text-5xl md:text-7xl font-normal scroll-word active';
                } else if (index < activeIndex) {
                    word.className = 'font-normal-sans text-5xl md:text-7xl font-normal scroll-word exit'; // scrolled past
                } else {
                    word.className = 'font-normal-sans text-5xl md:text-7xl font-normal scroll-word enter'; // hasn't reached yet
                }
            });

            // --- Logic B: Warping the Image Container ---
            // Rotate X and Y back and forth multiple times throughout the scroll
            const rotateX = Math.sin(progress * Math.PI * 4) * 25; // Twists up to 25 deg
            const rotateY = Math.cos(progress * Math.PI * 4) * 25; 
            
            // Scale dynamically (creates a breathing effect)
            const scale = 0.9 + Math.abs(Math.sin(progress * Math.PI * 2)) * 0.15;
            
            // Morph border radius for a liquid/blob feel
            const radius1 = 10 + progress * 40;
            const radius2 = 50 - progress * 40;
            const borderRadius = `${radius1}% ${radius2}% ${radius1}% ${radius2}%`;

            // Apply transformations
            warpContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;
            warpContainer.style.borderRadius = borderRadius;
        });

        // Trigger once on load to set initial states immediately
        window.dispatchEvent(new Event('scroll'));

        // --- PROJECT GRID (STRICT ROWS) & MODAL LOGIC ---

        const projectsData = [
            { 
                id: 1, name: "Neon Nights", 
                img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=600",
                imgSmall: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=400",
                desc1: "A fully immersive WebGL experience using custom shaders and Three.js.", desc2: "This project focused on pushing the boundaries of in-browser rendering. I handled the entire pipeline from 3D asset creation in Blender to final optimization and logic implementation." 
            },
            { 
                id: 2, name: "Echo Engine", 
                img: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?auto=format&fit=crop&q=80&w=600",
                imgSmall: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&q=80&w=400",
                desc1: "Custom audio-visualization tool built for live DJ performances.", desc2: "The tool reacts in real-time to frequency bands, morphing generative geometry. It features an intuitive UI allowing performers to tweak visual parameters on the fly." 
            },
            { 
                id: 3, name: "Project Adaptive", 
                img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80&w=600",
                imgSmall: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&q=80&w=400",
                desc1: "A massive e-commerce platform overhaul focusing on responsive architecture.", desc2: "Rebuilt the front-end using React and Tailwind CSS, improving load times by 40% and completely standardizing the design system across mobile and desktop viewpoints." 
            },
            { 
                id: 4, name: "Cyber Grid", 
                img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=600",
                imgSmall: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=400",
                desc1: "Procedural level generator and balancing tool for unity.", desc2: "Designed to help game developers rapidly iterate on grid-based puzzle designs. It exports serialized data directly into scriptable objects." 
            },
            { 
                id: 5, name: "Vanguard UI", 
                img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&q=80&w=600",
                imgSmall: "https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?auto=format&fit=crop&q=80&w=400",
                desc1: "Clean, accessible dashboard design for fintech applications.", desc2: "Focusing heavily on user-research and data clarity, this project simplified complex financial metrics into easily digestible, interactive charts." 
            },
            { 
                id: 6, name: "Data Visualization", 
                img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=600",
                imgSmall: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=400",
                desc1: "Complex datasets turned into beautiful, readable interfaces.", desc2: "Focused on clarity and performance using D3.js and custom canvas rendering to handle thousands of data points smoothly." 
            }
        ];

        function initProjects() {
            const grid = document.getElementById('project-grid');
            if(!grid) return;

            // Heights assigned to match wireframe staggering exactly
            // Row 1: Tall, Medium, Short
            // Row 2: Short, Medium, Tall
            const layoutHeights = [
                'h-[450px]', 'h-[350px]', 'h-[250px]', 
                'h-[250px]', 'h-[350px]', 'h-[450px]'
            ];

            projectsData.forEach((project, index) => {
                const wrapper = document.createElement('div');
                // Use flex-col to keep the title tucked nicely under the block
                wrapper.className = 'flex flex-col gap-2';

                const block = document.createElement('div');
                // Apply the staggered heights while grid maintains the clean horizontal row limits
                block.className = `project-block-img w-full ${layoutHeights[index % layoutHeights.length]}`;
                block.onclick = () => openProjectModal(project);
                
                // Only the image, no more text overlay or grey placeholder
                block.innerHTML = `<img src="${project.img}" alt="${project.name}">`;

                const title = document.createElement('h3');
                title.className = 'text-white font-normal-sans text-lg mt-1';
                title.innerText = project.name;

                wrapper.appendChild(block);
                wrapper.appendChild(title);
                grid.appendChild(wrapper);
            });
        }

        const projectModalOverlay = document.getElementById('project-modal-overlay');
        const closeProjectModalBtn = document.getElementById('close-project-modal');

        function openProjectModal(project) {
            document.getElementById('modal-title').innerText = project.name; // Wireframe uses project name here
            document.getElementById('modal-desc-1').innerText = project.desc1;
            document.getElementById('modal-desc-2').innerText = project.desc2;
            document.getElementById('modal-main-img').src = project.img;
            document.getElementById('modal-small-img').src = project.imgSmall;
            
            projectModalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeProjectModal() {
            projectModalOverlay.classList.remove('active');
            document.body.style.overflow = ''; 
        }

        closeProjectModalBtn.addEventListener('click', closeProjectModal);
        projectModalOverlay.addEventListener('click', (e) => {
            if (e.target === projectModalOverlay) closeProjectModal();
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initProjects);


        // --- ORIGINAL FOOTER / NAV SCRIPTS ---
        function setFooterEyeTracking(e) {
            const pupilL = document.getElementById('footer-pupilL');
            const pupilR = document.getElementById('footer-pupilR');
            const highL = document.getElementById('footer-highL');
            const highR = document.getElementById('footer-highR');
            if (!pupilL || !pupilR || !highL || !highR) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 12;
            const y = (e.clientY / window.innerHeight - 0.5) * 12;
            const translate = `translate(${x}, ${y})`;
            pupilL.setAttribute('transform', translate);
            pupilR.setAttribute('transform', translate);
            highL.setAttribute('transform', translate);
            highR.setAttribute('transform', translate);
        }
        window.addEventListener('mousemove', setFooterEyeTracking);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) setFooterEyeTracking(e.touches[0]);
        }, { passive: true });

        (function setupBurgerMenu() {
            const navToggle = document.getElementById('nav-toggle');
            const navLinks = document.querySelector('#top-nav .nav-links');
            const navOverlay = document.getElementById('nav-overlay');
            if (!navToggle || !navLinks || !navOverlay) return;

            const closeMenu = () => {
                navLinks.classList.remove('open');
                navOverlay.classList.remove('active');
                navToggle.setAttribute('aria-expanded', 'false');
            };

            navToggle.addEventListener('click', () => {
                const isOpen = navLinks.classList.toggle('open');
                navOverlay.classList.toggle('active', isOpen);
                navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });

            navOverlay.addEventListener('click', closeMenu);
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) closeMenu();
            });

            document.querySelectorAll('#top-nav .nav-links a').forEach((link) => link.addEventListener('click', closeMenu));
        })();
    </script>
