<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work | Dieuwe Buijink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js for 3D Model Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Lenis for Smooth Scrolling -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script defer src="site.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Bebas+Neue&family=Caveat:wght@700&display=swap');
        
        body { background-color: #00000A; color: white; margin: 0; font-family: 'Source Code Pro', monospace; }

        /* Work page background video (sticky/fixed only on work.html) */
        #page-bg-work {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            /* raise the visible area so the bottom is less in frame */
            object-position: center 100%;
            /* slightly darker */
            filter: brightness(0.90) saturate(0.95);
            /* slight zoom to crop more bottom */
            transform: scale(1.30);
            transform-origin: center center;
            will-change: transform;
            z-index: -1;
            pointer-events: none;
            background: #00000A;
        }

        /* autoplay-fallback UI removed (no play button) */
        .font-audiowide { font-family: 'Audiowide', sans-serif; }
        .font-normal-sans { font-family: 'Source Code Pro', monospace; }

        /* Lenis Smooth Scroll Base CSS */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        /* Global scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #00000A;
            border-left: 1px solid #1a1f24;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #0fbf9f, #1f4fbf, #c04f8f, #c08a2f, #2fbf4f);
            border-radius: 6px;
            border: 2px solid #00000A;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #bf4f8f, #0fbf9f, #c08a2f, #2fbf4f, #1f4fbf);
        }
        
        /* Entrance animation */
        #page-slide-wrapper {
            transform: translateY(100vh);
            animation: slideUpEnter 0.8s cubic-bezier(0.77, 0, 0.17, 1) forwards;
        }
        @keyframes slideUpEnter {
            to { transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        header#top-nav {
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav .max-w-7xl {
            max-width: 100% !important;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav nav {
            gap: 0.7rem !important;
        }

        /* SMPTE BROADCAST GLITCH BUTTONS */
        .btn-smpte-glitch {
            position: relative; border-radius: 8px; padding: 2px;
            background: #050012; overflow: hidden; display: inline-flex; transition: transform 0.3s ease;
        }
        .btn-smpte-glitch::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(#ffffff 0deg 4deg, #fdff00 4deg 8deg, #00fffc 8deg 12deg, #00ff00 12deg 16deg, #ff00fe 16deg 20deg, #ff0000 20deg 24deg, #0000fc 24deg 28deg, transparent 28deg 40deg);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-smpte-glitch:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        .btn-smpte-glitch:hover::before { animation: spin 0.2s steps(5) infinite; }
        .btn-gradient-inner { position: relative; z-index: 1; background: #050012; overflow: hidden; transition: none; border-radius: 6px; }
        .btn-smpte-glitch:hover .btn-gradient-inner { background: linear-gradient(to right, #ffffff 0% 14.28%, #fdff00 14.28% 28.57%, #00fffc 28.57% 42.85%, #00ff00 42.85% 57.14%, #ff00fe 57.14% 71.42%, #ff0000 71.42% 85.71%, #0000fc 85.71% 100%); color: #050012; font-weight: 900; }
        .btn-smpte-glitch:hover .btn-gradient-inner span.relative { text-shadow: 2px 2px 0px rgba(255,255,255,0.9), -2px -2px 0px rgba(255,255,255,0.9); mix-blend-mode: hard-light; }
        .btn-smpte-glitch .glitch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #ffffff 0% 14.28%, #fdff00 14.28% 28.57%, #00fffc 28.57% 42.85%, #00ff00 42.85% 57.14%, #ff00fe 57.14% 71.42%, #ff0000 71.42% 85.71%, #0000fc 85.71% 100%); opacity: 0; z-index: 2; pointer-events: none; filter: contrast(1.5) saturate(1.5); }
        .btn-smpte-glitch:hover .glitch-layer { opacity: 1; animation: smpte-tear 0.3s infinite linear alternate-reverse; }
        .btn-smpte-glitch:hover .btn-gradient-inner::after { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(transparent 0, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px); z-index: 3; pointer-events: none; animation: static-flicker 0.05s infinite; }
        
        @keyframes smpte-tear { 0% { clip-path: inset(10% -20% 80% -20%); transform: translateX(8px); } 20% { clip-path: inset(80% -20% 5% -20%); transform: translateX(-8px); } 40% { clip-path: inset(40% -20% 30% -20%); transform: translateX(12px); } 60% { clip-path: inset(15% -20% 60% -20%); transform: translateX(-6px); } 80% { clip-path: inset(60% -20% 10% -20%); transform: translateX(10px); } 100% { clip-path: inset(30% -20% 50% -20%); transform: translateX(-12px); } }
        @keyframes static-flicker { 0% { background-position: 0px 0px; } 50% { background-position: 2px -2px; } 100% { background-position: -2px 2px; } }

        /* CHROMATIC OVERLOAD */
        .btn-chromatic {
            position: relative; background: #000000; color: #ffffff; border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 8px 24px; border-radius: 4px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; transition: all 0.2s ease; cursor: pointer; z-index: 1; overflow: hidden;
            display: inline-flex; justify-content: center; align-items: center;
        }
        .btn-chromatic::before, .btn-chromatic::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; opacity: 0; background: #000000; z-index: 2;
        }
        .btn-chromatic::before { color: #00ff00; text-shadow: -2px 0 #00fffc, 2px 2px #fdff00; }
        .btn-chromatic::after { color: #ff0000; text-shadow: 2px 0 #ff00fe, -2px -2px #0000fc; }
        .btn-chromatic:hover { border-color: transparent !important; color: transparent !important; box-shadow: -4px -4px 0 rgba(0, 255, 204, 0.8), 4px 4px 0 rgba(255, 0, 127, 0.8); }
        .btn-chromatic:hover::before { opacity: 1; animation: chrom-glitch-1 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        .btn-chromatic:hover::after { opacity: 1; animation: chrom-glitch-2 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite reverse; }
        .btn-chromatic:active { box-shadow: -1px -1px 0 rgba(0, 255, 204, 0.8), 1px 1px 0 rgba(255, 0, 127, 0.8); transform: translate(2px, 2px); }

        @keyframes chrom-glitch-1 { 0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); } 20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); } 40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); } 60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); } 80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); } 100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); } }
        @keyframes chrom-glitch-2 { 0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); } 20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); } 40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); } 60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); } 80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); } 100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); } }

        .footer-name { font-size: clamp(2.1rem, 4.5vw, 4.2rem); line-height: 1.05; margin: 0; }
        footer { font-size: 1.15rem; }
        footer, footer p, footer a, footer span, footer h2, footer h3, footer div { font-size: 1.15rem; }
        footer .text-xs { font-size: 1.05rem; }
        
        .nav-toggle {
            display: none; font-size: 1.5rem; color: #00ffcc;
            background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffcc;
            border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; line-height: 1;
        }
        .nav-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px); z-index: 49;
        }
        .nav-overlay.active { display: block; }

        @media (max-width: 1024px) {
            .footer-name { font-size: clamp(1.9rem, 5.2vw, 3.6rem); }
            #top-nav nav { gap: 0.5rem !important; }
        }

        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            #top-nav .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; right: 0; 
                background: rgba(0, 0, 10, 0.95); backdrop-filter: blur(10px);
                flex-direction: column; align-items: center; padding: 2rem 0; 
                border-top: 1px solid #1a1f24; border-bottom: 2px solid #00ffcc;
                z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.9); gap: 1rem;
            }
            #top-nav .nav-links.open { display: flex !important; }
            .footer-name { font-size: clamp(1.9rem, 6.2vw, 3.4rem); }
        }

        @media (max-width: 768px) {
            #top-nav .nav-links a { display: block; width: 100%; text-align: center; padding: 0.75rem 1rem; }
            #top-nav .nav-links a.active, #top-nav .nav-links a[aria-current="page"] { background: rgba(0,255,204,0.06); color: #00ffcc; font-weight: 700; border-radius: 6px; }
        }
        
        @media (min-width: 769px) { #top-nav .nav-links { display: contents; } }

        #page-transition-curtain { position: fixed; inset: 0; background-color: #00000A; z-index: 49; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.17, 1); pointer-events: none; }
        .curtain-active { transform: translateY(0) !important; pointer-events: auto !important; }

        .perspective-grid-footer {
            background-image: linear-gradient(transparent 95%, rgba(255, 51, 51, 0.7) 100%), linear-gradient(90deg, transparent 95%, rgba(255, 51, 51, 0.7) 100%);
            background-size: 80px 50px; transform: perspective(400px) rotateX(60deg) scaleY(1.5);
            transform-origin: bottom; -webkit-mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
            mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
        }

        /* Footer Cat Link Styling */
        .footer-cat-link {
            display: inline-block;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        #footer-cat-container {
            transition: transform 0.3s ease;
        }

        /* Unique Typography for Scroll Words */
        .word-bold { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        .word-creative { font-family: 'Caveat', cursive; font-weight: 700; }
        .word-sleek { font-family: 'Source Code Pro', monospace; font-weight: 200; letter-spacing: 0.15em; text-transform: uppercase; }
        .word-adaptive { font-family: 'Audiowide', sans-serif; text-transform: lowercase; }

        /* Smooth 3D animation for the centered words */
        .scroll-word {
            position: absolute; left: 0; width: 100%; text-align: center;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity, filter, color, text-shadow; 
            pointer-events: none;
            transform-origin: center center;
        }
        
        .scroll-word.enter { 
            opacity: 0; 
            transform: translateY(60px) rotateX(-30deg) scale(0.9); 
            filter: blur(8px); 
            color: rgba(255,255,255,0.1); 
        }
        
        .scroll-word.active { 
            opacity: 1; 
            transform: translateY(0) rotateX(0deg) scale(1); 
            color: #00ffcc; 
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6), 0 0 30px rgba(0, 255, 204, 0.2); 
            filter: blur(0px); 
            z-index: 10; 
        }
        
        .scroll-word.exit { 
            opacity: 0; 
            transform: translateY(-60px) rotateX(30deg) scale(1.1); 
            filter: blur(8px); 
            color: rgba(255,255,255,0.1); 
        }

        .work-scroll-cue {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.25rem;
            color: rgba(255, 255, 255, 0.82);
            filter: drop-shadow(0 0 12px rgba(0, 255, 204, 0.2));
        }

        .work-scroll-cue .cue-arrow {
            width: clamp(2.8rem, 4vw, 4rem);
            height: clamp(2.8rem, 4vw, 4rem);
            animation: cue-bob 1.8s ease-in-out infinite;
        }

        @keyframes cue-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        .warp-model-shell {
            opacity: 0;
            transform: translateY(22px) scale(0.98);
            filter: blur(6px);
            transition: opacity 0.7s ease, transform 0.7s ease, filter 0.7s ease;
            will-change: opacity, transform, filter;
        }

        .warp-model-shell.is-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }

        /* Project Grid Block */
        .project-block-img {
            background-color: #111; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease; border: 4px solid transparent;
        }
        .project-block-img:hover { border-color: #3b82f6; transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6); }
        .project-block-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.3s ease, transform 0.5s ease; }
        .project-block-img:hover img { opacity: 1; transform: scale(1.03); }

        /* --- SMOKED HOLO MODAL STYLES (MOBILE OPTIMIZED) --- */
        #project-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 10, 0.85);
            backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; padding: 1rem;
            flex-direction: column;
        }
        #project-modal-overlay.active { display: flex; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content-box {
            width: 95%; max-width: 1400px; max-height: 85vh; 
            display: flex; flex-direction: column; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Source Code Pro', monospace;
            overflow: hidden;
            border-radius: 16px;

            /* Dynamic CSS Variables assigned via JS */
            --theme-primary: #ff3333;
            --theme-glow-1: rgba(255, 0, 254, 0.12);
            --theme-glow-2: rgba(0, 255, 204, 0.12);
            --theme-hover: #00ffcc;
            --theme-shadow: rgba(255, 51, 51, 0.4);

            background-color: rgba(15, 15, 20, 0.65); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(80, 80, 80, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.25); color: #f3f4f6;
            background-image: radial-gradient(circle at top right, var(--theme-glow-1), transparent 55%), radial-gradient(circle at bottom left, var(--theme-glow-2), transparent 55%);
            box-shadow: 0 35px 65px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.15);
        }

        @media (min-width: 768px) { 
            .modal-content-box { width: 70vw; border-radius: 24px; } 
        }
        
        .modal-scroll-area { padding: 1.25rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        @media (min-width: 768px) {
            .modal-scroll-area { padding: 2.5rem; gap: 2rem; }
        }

        .modal-scroll-area::-webkit-scrollbar { width: 6px; }
        .modal-scroll-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 0 16px 16px 0; }
        .modal-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        .modal-scroll-area::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
        
        @media (min-width: 768px) {
            .modal-scroll-area::-webkit-scrollbar { width: 8px; }
            .modal-scroll-area::-webkit-scrollbar-track { border-radius: 0 24px 24px 0; }
        }

        .modal-close-btn { position: absolute; top: 0.5rem; right: 1rem; font-size: 2rem; cursor: pointer; z-index: 10; line-height: 1; transition: all 0.3s ease; color: rgba(255,255,255,0.6); font-weight: 300; }
        @media (min-width: 768px) {
            .modal-close-btn { top: 1.5rem; right: 2rem; font-size: 2.5rem; }
        }
        .modal-close-btn:hover { color: var(--theme-hover); transform: rotate(90deg); text-shadow: 0 0 10px var(--theme-hover); }

        .modal-content-box h2 { color: var(--theme-primary); font-family: 'Audiowide', sans-serif; text-shadow: 0 0 15px var(--theme-shadow); text-transform: uppercase; font-size: 1.8rem !important; transition: color 0.4s ease, text-shadow 0.4s ease; margin-bottom: 0.25rem; padding-right: 1.5rem; }
        @media (min-width: 768px) {
            .modal-content-box h2 { font-size: 2.5rem !important; padding-right: 0; margin-bottom: 0.5rem; }
        }

        .modal-content-box p { color: rgba(255, 255, 255, 0.85); font-weight: 300; line-height: 1.6; font-size: 0.95rem; word-spacing: -0.2em; }
        @media (min-width: 768px) {
            .modal-content-box p { line-height: 1.8; font-size: 1.05rem; }
        }
        
        .modal-media-placeholder, .modal-small-media { 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; overflow: hidden; position: relative; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); background: rgba(10, 10, 15, 0.6);
        }
        .modal-media-placeholder { width: 100%; height: 200px; } 
        .modal-small-media { width: 100%; height: 180px; }
        
        @media (min-width: 768px) { 
            .modal-media-placeholder, .modal-small-media { border-radius: 16px; }
            .modal-media-placeholder { height: 450px; } 
            .modal-small-media { width: 40%; max-width: 450px; height: 280px; } 
        }
    </style>
</head>
<body class="selection:bg-[#ff007f] selection:text-white font-normal-sans select-none overflow-x-hidden">

    <video id="page-bg-work" autoplay muted loop playsinline preload="metadata" poster="pictures/noire_night_v2_poster.jpg">
        <source src="pictures/noire_night_v2.mp4" type="video/mp4">
    </video>

    <!-- autoplay-fallback removed: video will remain autoplay/muted; no UI inserted -->

    <div id="page-transition-curtain"></div>

    <header id="top-nav" class="fixed top-0 left-0 w-full z-50 px-6 py-4">
        <div class="flex items-center justify-between w-full max-w-7xl mx-auto relative">
            <div class="relative z-50">
                <a href="index.html" class="btn-smpte-glitch p-[2px] inline-flex">

                        <div class="glitch-layer"></div>
                    </div>
                </a>
            </div>

    </header>
    <div class="nav-overlay" id="nav-overlay"></div>

    <div id="page-slide-wrapper" class="w-full min-h-screen flex flex-col pt-24">
        
        <main class="flex-grow w-full flex flex-col items-center">
            
            <div class="w-[60%] pt-12 pb-4 flex justify-center border-b-[4px] border-white">
                <h1 class="font-audiowide text-6xl md:text-8xl text-white text-center">My Work</h1>
            </div>

            <div class="work-scroll-cue" aria-hidden="true">
                <svg class="cue-arrow" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 24L32 42L50 24" stroke="#00ffcc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 44L32 56L44 44" stroke="#00ffcc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
                </svg>
            </div>

    <script>
        // --- LENIS SMOOTH SCROLL INIT ---
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true,
        });

        // --- THREE.JS LOGIC FOR SCROLL MODEL ---
        const canvas = document.getElementById('model-canvas');
        const warpContainer = document.getElementById('warp-container');
        let loadedModel = null;
        
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100); 
        camera.position.set(0, 2, 8); 

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        
        const pointLight = new THREE.PointLight(0x00ffcc, 1.5, 10);
        pointLight.position.set(-2, 2, 2);
        scene.add(pointLight);

        function resizeCanvas() {
            if(!warpContainer) return;
            const width = warpContainer.clientWidth;
            const height = warpContainer.clientHeight;
            if (canvas.width !== width || canvas.height !== height) {
                renderer.setSize(width, height, false);
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const loader = new THREE.GLTFLoader();
        loader.load('pictures/fluxs_pit_stop.glb', (gltf) => {
            const rawModel = gltf.scene;
            const box = new THREE.Box3().setFromObject(rawModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetSize = 4.4; 
            const scale = targetSize / maxDim;
            rawModel.scale.set(scale, scale, scale);
            rawModel.position.sub(center.multiplyScalar(scale));
            
            loadedModel = new THREE.Group();
            loadedModel.add(rawModel);
            scene.add(loadedModel);
            document.getElementById('model-loading').style.display = 'none';
            resizeCanvas(); 
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            document.getElementById('model-loading').innerHTML = '<span class="text-red-500">Failed to load model</span>';
        });

        function animate(time) {
            requestAnimationFrame(animate);
            lenis.raf(time);
            renderer.render(scene, camera);
        }
        animate();


        // --- SCROLL ANIMATION LOGIC ---
        const warpSection = document.getElementById('scroll-warp-section');
        const scrollWords = document.querySelectorAll('.scroll-word');
        const totalWords = scrollWords.length;
        const warpContainerShell = document.getElementById('warp-container');
        const revealPointRatio = 0.18;

        function updateWorkReveal(shouldReveal) {
            if (!warpContainerShell) return;
            warpContainerShell.classList.toggle('is-visible', shouldReveal);
        }

        function updateScrollWords(progress, shouldReveal) {
            if (!scrollWords.length) return;

            if (!shouldReveal) {
                scrollWords.forEach((word) => {
                    word.classList.remove('active', 'exit');
                    word.classList.add('enter');
                });
                return;
            }

            const segment = 1 / totalWords;
            const activeIndex = Math.min(totalWords - 1, Math.floor(progress / segment));

            scrollWords.forEach((word, index) => {
                word.classList.remove('enter', 'active', 'exit');
                if (index === activeIndex) word.classList.add('active');
                else if (index < activeIndex) word.classList.add('exit');
                else word.classList.add('enter');
            });
        }

        window.addEventListener('scroll', () => {
            if(!warpSection || !warpContainer) return;
            const rect = warpSection.getBoundingClientRect();
            const sectionTop = rect.top;
            const sectionHeight = rect.height;
            const windowHeight = window.innerHeight;
            const revealPoint = windowHeight * revealPointRatio;
            const shouldReveal = window.scrollY > revealPoint;
            
            let progress = 0;
            if (sectionTop <= 0) {
                const scrollableDistance = sectionHeight - windowHeight;
                progress = Math.abs(sectionTop) / scrollableDistance;
            }
            progress = Math.max(0, Math.min(1, progress));

            updateWorkReveal(shouldReveal);
            updateScrollWords(progress, shouldReveal);

            if (loadedModel) {
                loadedModel.rotation.y = progress * Math.PI * 2; 
                camera.position.x = Math.sin(progress * Math.PI) * 4; 
                camera.position.y = 2 + Math.sin(progress * Math.PI) * 4; 
                camera.position.z = 8 - (progress * 2.2); 
                camera.lookAt(0, 0, 0);
            }
        });

        // --- PROJECT DATA ---
        const projectsData = [
            { id: 1, name: "Virtual humans project", img: "pictures/work page/Virtual humans.png", imgSmall: "pictures/work page/Virtual humans.png", desc1: "A fully immersive WebGL experience using custom shaders and Three.js.", desc2: "I handled the entire pipeline from 3D asset creation in Blender to final optimization.", desc3: "Architecture built with React Three Fiber and Web Audio API integration.", theme: { primary: '#00e5ff', hover: '#d946ef', glow1: 'rgba(0, 229, 255, 0.15)', glow2: 'rgba(217, 70, 239, 0.15)', shadow: 'rgba(0, 229, 255, 0.4)' } },
            { id: 2, name: "Jägermeister Health campaign", img: "pictures/work page/Jagermeister health.png", imgSmall: "pictures/work page/Jagermeister health.png", desc1: "Custom audio-visualization tool built for live DJ performances.", desc2: "Reacts in real-time to frequency bands, morphing generative geometry.", desc3: "Built using C++ and openFrameworks for absolute minimal latency.", theme: { primary: '#a3e635', hover: '#fde047', glow1: 'rgba(163, 230, 53, 0.15)', glow2: 'rgba(253, 224, 71, 0.15)', shadow: 'rgba(163, 230, 53, 0.4)' } },
            { id: 3, name: "Desertion game", img: "pictures/work page/Dessertion.png", imgSmall: "pictures/work page/Dessertion.png", desc1: "A massive e-commerce platform overhaul focusing on responsive architecture.", desc2: "Rebuilt with React and Tailwind CSS, improving load times by 40%.", desc3: "Headless architecture with Next.js for SSR and static generation.", theme: { primary: '#3b82f6', hover: '#60a5fa', glow1: 'rgba(59, 130, 246, 0.15)', glow2: 'rgba(96, 165, 250, 0.15)', shadow: 'rgba(59, 130, 246, 0.4)' } },
            { id: 4, name: "AVK website design and game", img: "pictures/work page/AVK.png", imgSmall: "pictures/work page/AVK.png", desc1: "Procedural level generator and balancing tool for Unity.", desc2: "Helping game developers rapidly iterate on grid-based puzzle designs.", desc3: "Utilizes Wave Function Collapse and A* pathfinding algorithms.", theme: { primary: '#ef4444', hover: '#fca5a5', glow1: 'rgba(239, 68, 68, 0.15)', glow2: 'rgba(252, 165, 165, 0.15)', shadow: 'rgba(239, 68, 68, 0.4)' } },
            { id: 5, name: "Bits and bobs", img: "pictures/work page/bits and bobs.gif", imgSmall: "pictures/work page/bits and bobs.gif", desc1: "Enterprise fintech dashboard design focusing on data clarity.", desc2: "Simplified complex financial metrics into interactive charts.", desc3: "Constructed with Vue 3 and custom-built ECharts WebGL layer.", theme: { primary: '#8b5cf6', hover: '#c4b5fd', glow1: 'rgba(139, 92, 246, 0.15)', glow2: 'rgba(196, 181, 253, 0.15)', shadow: 'rgba(139, 92, 246, 0.4)' } },
            { id: 6, name: "Photo portfolio", img: "pictures/work page/photo album.jpg", imgSmall: "pictures/work page/photo album.jpg", desc1: "Transforming massive datasets into interactive 3D globe visualizations.", desc2: "Inspired by sci-fi HUDs with glowing nodes and connecting lines.", desc3: "Powered by deck.gl and Mapbox with custom GPU shaders.", theme: { primary: '#f97316', hover: '#fbbf24', glow1: 'rgba(249, 115, 22, 0.15)', glow2: 'rgba(251, 191, 36, 0.15)', shadow: 'rgba(249, 115, 22, 0.4)' } }
        ];

        function initProjects() {
            const grid = document.getElementById('project-grid');
            if(!grid) return;
            const layoutHeights = ['h-[450px]', 'h-[350px]', 'h-[250px]', 'h-[250px]', 'h-[350px]', 'h-[450px]'];
            projectsData.forEach((project, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex flex-col gap-2';
                const block = document.createElement('div');
                block.className = `project-block-img w-full ${layoutHeights[index % layoutHeights.length]}`;
                block.onclick = () => openProjectModal(project);
                block.innerHTML = `<img src="${project.img}" alt="${project.name}">`;
                const title = document.createElement('h3');
                title.className = 'text-white font-normal-sans text-lg mt-1';
                title.innerText = project.name;
                wrapper.appendChild(block);
                wrapper.appendChild(title);
                grid.appendChild(wrapper);
            });
        }

        const projectModalOverlay = document.getElementById('project-modal-overlay');
        const closeProjectModalBtn = document.getElementById('close-project-modal');
        const modalBox = document.getElementById('dynamic-modal-box');

        function openProjectModal(project) {
            document.getElementById('modal-title').innerText = project.name;
            document.getElementById('modal-desc-1').innerText = project.desc1;
            document.getElementById('modal-desc-2').innerText = project.desc2;
            document.getElementById('modal-desc-3').innerText = project.desc3;
            document.getElementById('modal-main-img').src = project.img;
            document.getElementById('modal-small-img').src = project.imgSmall;
            modalBox.style.setProperty('--theme-primary', project.theme.primary);
            modalBox.style.setProperty('--theme-hover', project.theme.hover);
            modalBox.style.setProperty('--theme-glow-1', project.theme.glow1);
            modalBox.style.setProperty('--theme-glow-2', project.theme.glow2);
            modalBox.style.setProperty('--theme-shadow', project.theme.shadow);
            const scrollArea = modalBox.querySelector('.modal-scroll-area');
            if(scrollArea) scrollArea.scrollTop = 0;
            projectModalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            lenis.stop();
        }

        function closeProjectModal() {
            projectModalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            lenis.start();
        }

        closeProjectModalBtn.addEventListener('click', closeProjectModal);
        projectModalOverlay.addEventListener('click', (e) => { if (e.target === projectModalOverlay) closeProjectModal(); });
        document.addEventListener('DOMContentLoaded', initProjects);

    </script>
