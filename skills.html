<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Dieuwe Buijink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&display=swap');
        body { background-color: #00000A; color: white; margin: 0; font-family: 'Audiowide', sans-serif; }
        .font-audiowide { font-family: 'Audiowide', sans-serif; }
        .font-normal-sans { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }

        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #00000A;
            border-left: 1px solid #1a1f24;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #0fbf9f, #1f4fbf, #c04f8f, #c08a2f, #2fbf4f);
            border-radius: 6px;
            border: 2px solid #00000A; /* Creates an inset padding effect */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #bf4f8f, #0fbf9f, #c08a2f, #2fbf4f, #1f4fbf);
        }
        
        /* The "Slide in from bottom" entrance animation */
        #page-slide-wrapper {
            transform: translateY(100vh);
            animation: slideUpEnter 0.8s cubic-bezier(0.77, 0, 0.17, 1) forwards;
        }
        @keyframes slideUpEnter {
            to { transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        header#top-nav {
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav .max-w-7xl {
            max-width: 100% !important;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav nav {
            gap: 0.7rem !important;
        }

        /* SMPTE BROADCAST GLITCH BUTTONS */
        .btn-smpte-glitch {
            position: relative; border-radius: 8px; padding: 2px;
            background: #050012; overflow: hidden; display: inline-flex; transition: transform 0.3s ease;
        }
        .btn-smpte-glitch::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(#ffffff 0deg 4deg, #fdff00 4deg 8deg, #00fffc 8deg 12deg, #00ff00 12deg 16deg, #ff00fe 16deg 20deg, #ff0000 20deg 24deg, #0000fc 24deg 28deg, transparent 28deg 40deg);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-smpte-glitch:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        .btn-smpte-glitch:hover::before { animation: spin 0.2s steps(5) infinite; }
        .btn-gradient-inner { position: relative; z-index: 1; background: #050012; overflow: hidden; transition: none; border-radius: 6px; }
        .btn-smpte-glitch:hover .btn-gradient-inner { background: linear-gradient(to right, #ffffff 0% 14.28%, #fdff00 14.28% 28.57%, #00fffc 28.57% 42.85%, #00ff00 42.85% 57.14%, #ff00fe 57.14% 71.42%, #ff0000 71.42% 85.71%, #0000fc 85.71% 100%); color: #050012; font-weight: 900; }
        .btn-smpte-glitch:hover .btn-gradient-inner span.relative { text-shadow: 2px 2px 0px rgba(255,255,255,0.9), -2px -2px 0px rgba(255,255,255,0.9); mix-blend-mode: hard-light; }
        .btn-smpte-glitch .glitch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #ffffff 0% 14.28%, #fdff00 14.28% 28.57%, #00fffc 28.57% 42.85%, #00ff00 42.85% 57.14%, #ff00fe 57.14% 71.42%, #ff0000 71.42% 85.71%, #0000fc 85.71% 100%); opacity: 0; z-index: 2; pointer-events: none; filter: contrast(1.5) saturate(1.5); }
        .btn-smpte-glitch:hover .glitch-layer { opacity: 1; animation: smpte-tear 0.3s infinite linear alternate-reverse; }
        .btn-smpte-glitch:hover .btn-gradient-inner::after { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(transparent 0, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px); z-index: 3; pointer-events: none; animation: static-flicker 0.05s infinite; }
        
        @keyframes smpte-tear { 0% { clip-path: inset(10% -20% 80% -20%); transform: translateX(8px); } 20% { clip-path: inset(80% -20% 5% -20%); transform: translateX(-8px); } 40% { clip-path: inset(40% -20% 30% -20%); transform: translateX(12px); } 60% { clip-path: inset(15% -20% 60% -20%); transform: translateX(-6px); } 80% { clip-path: inset(60% -20% 10% -20%); transform: translateX(10px); } 100% { clip-path: inset(30% -20% 50% -20%); transform: translateX(-12px); } }
        @keyframes static-flicker { 0% { background-position: 0px 0px; } 50% { background-position: 2px -2px; } 100% { background-position: -2px 2px; } }

        /* CHROMATIC OVERLOAD */
        .btn-chromatic {
            position: relative; background: #000000; color: #ffffff; border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 8px 24px; border-radius: 4px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; transition: all 0.2s ease; cursor: pointer; z-index: 1; overflow: hidden;
            display: inline-flex; justify-content: center; align-items: center;
        }
        .btn-chromatic::before, .btn-chromatic::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; opacity: 0; background: #000000; z-index: 2;
        }
        .btn-chromatic::before { color: #00ff00; text-shadow: -2px 0 #00fffc, 2px 2px #fdff00; }
        .btn-chromatic::after { color: #ff0000; text-shadow: 2px 0 #ff00fe, -2px -2px #0000fc; }
        .btn-chromatic:hover { border-color: transparent !important; color: transparent !important; box-shadow: -4px -4px 0 rgba(0, 255, 204, 0.8), 4px 4px 0 rgba(255, 0, 127, 0.8); }
        .btn-chromatic:hover::before { opacity: 1; animation: chrom-glitch-1 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        .btn-chromatic:hover::after { opacity: 1; animation: chrom-glitch-2 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite reverse; }
        .btn-chromatic:active { box-shadow: -1px -1px 0 rgba(0, 255, 204, 0.8), 1px 1px 0 rgba(255, 0, 127, 0.8); transform: translate(2px, 2px); }

        @keyframes chrom-glitch-1 { 0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); } 20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); } 40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); } 60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); } 80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); } 100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); } }
        @keyframes chrom-glitch-2 { 0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); } 20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); } 40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); } 60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); } 80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); } 100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); } }

        /* =========================================
           GLOBAL PULSING HEATMAP & DOTS
          
           ========================================= */
        .page-heatmap {
            position: absolute;
            top: -6rem;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 10% 15%, rgba(0, 255, 204, 0.25), transparent 45%),
                radial-gradient(circle at 85% 25%, rgba(255, 0, 127, 0.2), transparent 50%),
                radial-gradient(circle at 40% 50%, rgba(0, 100, 255, 0.25), transparent 50%),
                radial-gradient(circle at 75% 70%, rgba(255, 170, 0, 0.2), transparent 45%),
                radial-gradient(circle at 20% 85%, rgba(0, 255, 204, 0.2), transparent 50%);
            filter: blur(80px);
            animation: pulseHeatmapSmooth 8s infinite ease-in-out;
            pointer-events: none;
            opacity: 0.7;
        }

        .page-dots {
            position: absolute;
            inset: -6rem 0 0 0; /* Expanded upwards */
            background-image: url('pictures/');
            background-repeat: repeat;
            background-position: 0 0;
            background-size: auto;
            pointer-events: none;
            opacity: 0.12;
            z-index: 0; /* Lowered z-index below the cards */
        }

        @keyframes pulseHeatmapSmooth {
            0% { opacity: 0.5; filter: blur(80px) brightness(0.9) hue-rotate(0deg); }
            12.5% { opacity: 0.65; filter: blur(75px) brightness(1.1) hue-rotate(30deg); }
            25% { opacity: 0.8; filter: blur(85px) brightness(1.0) hue-rotate(60deg); }
            37.5% { opacity: 0.65; filter: blur(78px) brightness(1.05) hue-rotate(90deg); }
            50% { opacity: 0.5; filter: blur(80px) brightness(0.9) hue-rotate(120deg); }
            62.5% { opacity: 0.65; filter: blur(75px) brightness(1.1) hue-rotate(150deg); }
            75% { opacity: 0.8; filter: blur(85px) brightness(1.0) hue-rotate(180deg); }
            87.5% { opacity: 0.65; filter: blur(78px) brightness(1.05) hue-rotate(210deg); }
            100% { opacity: 0.5; filter: blur(80px) brightness(0.9) hue-rotate(360deg); }
        }

        .skill-line-top {
            background-image: 
                linear-gradient(to right, white 100%, transparent 100%),
                radial-gradient(circle 5px at 20px 0px, white 100%, transparent 100%),
                radial-gradient(circle 5px at 40px 0px, white 100%, transparent 100%),
                radial-gradient(circle 5px at 60px 0px, white 100%, transparent 100%);
            background-size: 100% 2px, 20px 20px, 20px 20px, 20px 20px;
            background-position: 0 0, 10px -8px, 30px -8px, 50px -8px;
            background-repeat: repeat-x;
        }

        .skill-line-bottom {
            background-image: 
                linear-gradient(to right, white 100%, transparent 100%),
                radial-gradient(circle 5px at 20px 0px, white 100%, transparent 100%),
                radial-gradient(circle 5px at 40px 0px, white 100%, transparent 100%),
                radial-gradient(circle 5px at 60px 0px, white 100%, transparent 100%);
            background-size: 100% 2px, 20px 20px, 20px 20px, 20px 20px;
            background-position: 0 0, 10px 8px, 30px 8px, 50px 8px;
            background-repeat: repeat-x;
        }

        /* --- SOUNDBAR EQ EFFECT --- */
        .eq-bar {
            flex: 1;
            min-width: 2px;
            max-width: 8px;
            height: 100%;
            background: linear-gradient(to top, #00ffcc, #0088ff);
            border-radius: 2px 2px 0 0;
            transform-origin: bottom;
            animation: eq-bounce 4s infinite ease-in-out alternate;
            opacity: 0.9;
            box-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }
        .eq-bar.down {
            background: linear-gradient(to bottom, #00ffcc, #0088ff);
            border-radius: 0 0 2px 2px;
            transform-origin: top;
        }
        @keyframes eq-bounce {
            0% { transform: scaleY(0.1); opacity: 0.4; }
            50% { transform: scaleY(0.7); opacity: 0.8; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .footer-name { font-size: clamp(2rem, 4vw, 4rem); line-height: 1.05; margin: 0; }
        footer { font-size: 1.1rem; }
        
        .nav-toggle {
            display: none; font-size: 1.5rem; color: #00ffcc; background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffcc;
            border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; line-height: 1;
        }
        .nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(3px); z-index: 49; }
        .nav-overlay.active { display: block; }

        @media (max-width: 1024px) {
            .footer-name { font-size: clamp(1.8rem, 5vw, 3.5rem); }
            #top-nav nav { gap: 0.5rem !important; }
        }
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            #top-nav .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; right: 0; 
                background: rgba(0, 0, 10, 0.95); backdrop-filter: blur(10px);
                flex-direction: column; align-items: center; padding: 2rem 0; 
                border-top: 1px solid #1a1f24; border-bottom: 2px solid #00ffcc;
                z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.9); gap: 1rem;
            }
            #top-nav .nav-links.open { display: flex !important; }
            .footer-name { font-size: clamp(1.8rem, 6vw, 3.3rem); }
        }
        @media (min-width: 769px) { #top-nav .nav-links { display: contents; } }

        #page-transition-curtain { position: fixed; inset: 0; background-color: #00000A; z-index: 49; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.17, 1); pointer-events: none; }
        .curtain-active { transform: translateY(0) !important; pointer-events: auto !important; }

        .perspective-grid-footer {
            background-image: linear-gradient(transparent 95%, rgba(255, 204, 0, 0.7) 100%), linear-gradient(90deg, transparent 95%, rgba(255, 204, 0, 0.7) 100%);
            background-size: 80px 50px; transform: perspective(400px) rotateX(60deg) scaleY(1.5);
            transform-origin: bottom; -webkit-mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
            mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
        }

        /* --- SKILLS CAROUSEL --- */
        .carousel-wrapper {
            height: 85vh; 
            min-height: 500px;
            overflow: hidden; 
            position: relative;
        }
        @media (min-width: 768px) {
            .carousel-wrapper { min-height: 650px; }
        }

        .carousel-track { 
            display: flex; 
            flex-direction: column; 
            gap: 1rem;
            width: 100%; 
            max-width: 480px; 
        }
        @media (min-width: 768px) {
            .carousel-track { gap: 2rem; }
        }

        .skill-card {
            position: relative; background: #d1d5db; border-radius: 8px; overflow: hidden; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid transparent; 
            height: 180px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .skill-card { height: 260px; }
        }

        .skill-card:hover { transform: scale(1.06) translateY(-4px); box-shadow: 0 15px 30px rgba(0, 255, 204, 0.4), inset 0 0 15px rgba(0, 255, 204, 0.2); border-color: #00ffcc; z-index: 20; }
        .skill-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.3s ease; }
        .skill-card:hover img { opacity: 0.3; }

        .skill-card-text {
            position: relative; z-index: 10; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            font-weight: bold; 
            font-size: 1.1rem;
            color: #111827; text-align: center;
            background: rgba(255, 255, 255, 0.85); 
            padding: 0.5rem 0.75rem;
            border-radius: 4px; transition: all 0.3s ease;
            width: 90%; word-wrap: break-word;
        }
        @media (min-width: 768px) {
            .skill-card-text {
                font-size: 1.75rem;
                padding: 0.75rem 1.5rem;
                width: auto;
            }
        }
        
        .skill-card:hover .skill-card-text { background: #00ffcc; color: #00000A; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); }

        .track-down { animation: scrollDown 18s linear infinite; }
        .track-up { animation: scrollUp 18s linear infinite; }
        @keyframes scrollDown { 0% { transform: translateY(var(--shift-amount, -1168px)); } 100% { transform: translateY(0); } }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(var(--shift-amount, -1168px)); } }

        /* --- MODAL OVERLAY --- */
        #skill-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 10, 0.85);
            backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; padding: 1rem;
            flex-direction: column;
        }
        #skill-modal-overlay.active { display: flex; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Base Modal Box (Smoked Holo Base) - RESPONSIVE MOBILE SIZING */
        .modal-content-box {
            width: 95%; /* Default for mobile */
            max-width: 1400px;
            max-height: 85vh; 
            display: flex; flex-direction: column; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow: hidden;

            /* Dynamic CSS Variables assigned via JS */
            --theme-primary: #ff3333;
            --theme-glow-1: rgba(255, 0, 254, 0.12);
            --theme-glow-2: rgba(0, 255, 204, 0.12);
            --theme-hover: #00ffcc;
            --theme-shadow: rgba(255, 51, 51, 0.4);

            background-color: rgba(15, 15, 20, 0.65); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(80, 80, 80, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.25); border-radius: 16px; color: #f3f4f6;
            background-image: radial-gradient(circle at top right, var(--theme-glow-1), transparent 55%), radial-gradient(circle at bottom left, var(--theme-glow-2), transparent 55%);
            box-shadow: 0 35px 65px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.15);
        }

        @media (min-width: 768px) {
            .modal-content-box { width: 70vw; border-radius: 24px; }
        }
        
        /* Modal Padding & Inner Layout scaled for mobile */
        .modal-scroll-area { padding: 1.25rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        @media (min-width: 768px) {
            .modal-scroll-area { padding: 2.5rem; gap: 2rem; }
        }

        .modal-scroll-area::-webkit-scrollbar { width: 6px; }
        .modal-scroll-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 0 16px 16px 0; }
        .modal-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        .modal-scroll-area::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
        
        @media (min-width: 768px) {
            .modal-scroll-area::-webkit-scrollbar { width: 8px; }
            .modal-scroll-area::-webkit-scrollbar-track { border-radius: 0 24px 24px 0; }
        }

        .modal-close-btn { position: absolute; top: 0.5rem; right: 1rem; font-size: 2rem; cursor: pointer; z-index: 10; line-height: 1; transition: all 0.3s ease; color: rgba(255,255,255,0.6); font-weight: 300; }
        @media (min-width: 768px) {
            .modal-close-btn { top: 1.5rem; right: 2rem; font-size: 2.5rem; }
        }
        .modal-close-btn:hover { color: var(--theme-hover); transform: rotate(90deg); text-shadow: 0 0 10px var(--theme-hover); }

        .modal-content-box h2 { color: var(--theme-primary); font-family: 'Audiowide', sans-serif; text-shadow: 0 0 15px var(--theme-shadow); text-transform: uppercase; font-size: 1.8rem !important; transition: color 0.4s ease, text-shadow 0.4s ease; margin-bottom: 0.25rem; padding-right: 1.5rem; }
        @media (min-width: 768px) {
            .modal-content-box h2 { font-size: 2.5rem !important; padding-right: 0; margin-bottom: 0.5rem; }
        }

        .modal-content-box p { color: rgba(255, 255, 255, 0.85); font-weight: 300; line-height: 1.6; font-size: 0.95rem; }
        @media (min-width: 768px) {
            .modal-content-box p { line-height: 1.8; font-size: 1.05rem; }
        }
        
        /* Modal Media Placeholders */
        .modal-media-placeholder, .modal-small-media { 
            display: flex; align-items: center; justify-content: center; text-align: center;
            transition: all 0.3s; flex-shrink: 0; padding: 1rem;
            background: rgba(10, 10, 15, 0.6); border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 12px; color: rgba(255,255,255,0.5); font-family: 'Audiowide', sans-serif; 
            text-transform: uppercase; font-size: 0.8rem; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .modal-media-placeholder { width: 100%; height: 200px; } 
        .modal-small-media { width: 100%; height: 180px; }
        
        @media (min-width: 768px) {
            .modal-media-placeholder, .modal-small-media { border-radius: 16px; font-size: 1rem; padding: 0;}
            .modal-media-placeholder { height: 450px; } 
            .modal-small-media { width: 40%; max-width: 450px; height: 280px; } /* Proportional side image */
        }
    </style>
</head>
<body class="selection:bg-[#ff007f] selection:text-white font-normal-sans select-none overflow-x-hidden">

    <div id="page-transition-curtain"></div>

    <header id="top-nav" class="fixed top-0 left-0 w-full z-50 px-6 py-4">
        <div class="flex items-center justify-between w-full max-w-7xl mx-auto relative">
            <div class="relative z-50">
                <a href="index.html" class="btn-smpte-glitch p-[2px] inline-flex">
                    <div class="btn-gradient-inner flex items-center justify-center px-4 md:px-5 py-2 text-sm whitespace-nowrap uppercase font-audiowide tracking-wider text-gray-300 w-full h-full">
                        <span class="relative z-10">Dieuwe Buijink</span>
                        <div class="glitch-layer"></div>
                    </div>
                </a>
            </div>

            <button id="nav-toggle" class="nav-toggle relative z-50" aria-expanded="false" aria-label="Toggle navigation">☰</button>

            <div class="nav-links w-full md:w-auto">
                <nav class="flex flex-col md:flex-row gap-3 md:gap-4 items-center w-full md:w-auto">
                    <a href="index.html#about" class="btn-chromatic font-audiowide text-xs md:text-sm w-[85%] md:w-auto" data-text="About">About</a>
                    <a href="work.html" class="btn-chromatic font-audiowide text-xs md:text-sm w-[85%] md:w-auto" data-text="Work">Work</a>
                    <a href="skills.html" class="btn-chromatic font-audiowide text-xs md:text-sm w-[85%] md:w-auto" style="color: #00ffcc; border-color: rgba(255, 255, 255, 0.6); text-shadow: 0 0 10px rgba(0,255,204,0.5);" data-text="Skills">Skills</a>
                </nav>
                <div class="mt-4 md:mt-0 flex justify-center w-full md:w-auto md:ml-4">
                    <a href="contact.html" class="btn-chromatic font-audiowide text-sm w-[85%] md:w-auto" data-text="Let's connect!">Let's connect!</a>
                </div>
            </div>
        </div>

        function createSkillCard(skill) {
            const card = document.createElement('div');
            card.className = 'skill-card';
            card.onclick = () => openModal(skill);
            card.innerHTML = `
                <img src="${skill.img}" alt="${skill.name}">
                <div class="skill-card-text">${skill.name}</div>
            `;
            return card;
        }

        function initCarousels() {
            const trackDown = document.getElementById('track-down');
            const trackUp = document.getElementById('track-up');
            const half = Math.ceil(skillsData.length / 2);
            const col1Data = skillsData.slice(0, half);
            const col2Data = skillsData.slice(half);

            const populateTrack = (track, data) => {
                for (let i = 0; i < 4; i++) { 
                    data.forEach(skill => track.appendChild(createSkillCard(skill)));
                }
            };

            populateTrack(trackDown, col1Data);
            populateTrack(trackUp, col2Data);

            const setShiftAmounts = () => {
                const isMobile = window.innerWidth < 768;
                const cardHeight = isMobile ? 180 : 260;
                const remValue = parseFloat(getComputedStyle(document.documentElement).fontSize);
                const gapSize = isMobile ? 1 * remValue : 2 * remValue;

                const singleSetHeight1 = col1Data.length * cardHeight + col1Data.length * gapSize;
                const singleSetHeight2 = col2Data.length * cardHeight + col2Data.length * gapSize;
                
                trackDown.style.setProperty('--shift-amount', `-${singleSetHeight1}px`);
                trackUp.style.setProperty('--shift-amount', `-${singleSetHeight2}px`);
            };

            setShiftAmounts();
            window.addEventListener('resize', setShiftAmounts);

            const viewList = document.getElementById('view-list');
            skillsData.forEach(skill => viewList.appendChild(createSkillCard(skill)));

            setupViewToggles();
        }

        function setupViewToggles() {
            const btnSlider = document.getElementById('toggle-slider');
            const btnList = document.getElementById('toggle-list');
            const viewSlider = document.getElementById('view-slider');
            const viewList = document.getElementById('view-list');

            btnSlider.addEventListener('click', () => {
                viewSlider.classList.remove('hidden'); viewSlider.classList.add('flex');
                viewList.classList.remove('grid'); viewList.classList.add('hidden');
                btnSlider.className = "cursor-pointer text-[#00ffcc] transition-colors";
                btnList.className = "cursor-pointer text-gray-500 hover:text-white transition-colors";
            });

            btnList.addEventListener('click', () => {
                viewSlider.classList.remove('flex'); viewSlider.classList.add('hidden');
                viewList.classList.remove('hidden'); viewList.classList.add('grid');
                btnList.className = "cursor-pointer text-[#00ffcc] transition-colors";
                btnSlider.className = "cursor-pointer text-gray-500 hover:text-white transition-colors";
            });
        }

        // --- MODAL LOGIC ---
        const modalOverlay = document.getElementById('skill-modal-overlay');
        const closeModalBtn = document.getElementById('close-modal');
        const modalBox = document.getElementById('dynamic-modal-box');

        function openModal(skill) {
            document.getElementById('modal-title').innerText = skill.name;
            document.getElementById('modal-desc-1').innerText = skill.desc1;
            document.getElementById('modal-desc-2').innerText = skill.desc2;
            document.getElementById('modal-desc-3').innerText = skill.desc3;
            
            // Inject skill-specific theme colors
            modalBox.style.setProperty('--theme-primary', skill.theme.primary);
            modalBox.style.setProperty('--theme-hover', skill.theme.hover);
            modalBox.style.setProperty('--theme-glow-1', skill.theme.glow1);
            modalBox.style.setProperty('--theme-glow-2', skill.theme.glow2);
            modalBox.style.setProperty('--theme-shadow', skill.theme.shadow);
            
            // Reset scroll position to top whenever a new modal is opened
            const scrollArea = modalBox.querySelector('.modal-scroll-area');
            if(scrollArea) scrollArea.scrollTop = 0;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = ''; 
        }

        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // --- SOUNDBAR INITIALIZATION ---
        function initSoundBars() {
            const topBar = document.getElementById('soundbar-top');
            const bottomBar = document.getElementById('soundbar-bottom');
            const numBars = 120; // Enough bars to span screens
            
            const createBars = (container, isDown) => {
                if(!container) return;
                container.innerHTML = '';
                for(let i = 0; i < numBars; i++) {
                    const bar = document.createElement('div');
                    bar.className = `eq-bar ${isDown ? 'down' : ''}`;
                    const duration = 0.3 + Math.random() * 0.8;
                    const delay = Math.random() * -3; 
                    bar.style.animationDuration = `${duration}s`;
                    bar.style.animationDelay = `${delay}s`;
                    container.appendChild(bar);
                }
            }
            
            createBars(topBar, false);
            createBars(bottomBar, true);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCarousels();
            initSoundBars();
        });

        // --- FOOTER EYE TRACKING & NAV ---
        function setFooterEyeTracking(e) {
            const pupilL = document.getElementById('footer-pupilL');
            const pupilR = document.getElementById('footer-pupilR');
            const highL = document.getElementById('footer-highL');
            const highR = document.getElementById('footer-highR');
            if (!pupilL || !pupilR || !highL || !highR) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 12;
            const y = (e.clientY / window.innerHeight - 0.5) * 12;
            const translate = `translate(${x}, ${y})`;
            pupilL.setAttribute('transform', translate);
            pupilR.setAttribute('transform', translate);
            highL.setAttribute('transform', translate);
            highR.setAttribute('transform', translate);
        }
        window.addEventListener('mousemove', setFooterEyeTracking);

        (function setupBurgerMenu() {
            const navToggle = document.getElementById('nav-toggle');
            const navLinks = document.querySelector('#top-nav .nav-links');
            const navOverlay = document.getElementById('nav-overlay');
            if (!navToggle || !navLinks || !navOverlay) return;

            const closeMenu = () => {
                navLinks.classList.remove('open'); navOverlay.classList.remove('active');
                navToggle.setAttribute('aria-expanded', 'false');
            };

            navToggle.addEventListener('click', () => {
                const isOpen = navLinks.classList.toggle('open');
                navOverlay.classList.toggle('active', isOpen);
                navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });

            navOverlay.addEventListener('click', closeMenu);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeMenu(); });
            document.querySelectorAll('#top-nav .nav-links a').forEach((link) => link.addEventListener('click', closeMenu));
        })();
    </script>
</body>
</html>
