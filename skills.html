    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&display=swap');
        body { background-color: #00000A; color: white; margin: 0; font-family: 'Audiowide', sans-serif; }
        .font-audiowide { font-family: 'Audiowide', sans-serif; }
        .font-normal-sans { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        
        /* The "Slide in from bottom" entrance animation */
        #page-slide-wrapper {
            transform: translateY(100vh);
            animation: slideUpEnter 0.8s cubic-bezier(0.77, 0, 0.17, 1) forwards;
        }
        @keyframes slideUpEnter {
            to { transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        /* Expanded Top Nav for Edge Alignment */
        header#top-nav {
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav .max-w-7xl {
            max-width: 100% !important;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav nav {
            gap: 0.7rem !important;
        }

        /* Metallic Nav Buttons */
        .metal-nav-btn {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; letter-spacing: 0.05em;
            font-size: clamp(0.98rem, 1.8vw, 1.2rem);
            padding: 0.8rem 1rem;
            background: linear-gradient(180deg, #2a2d30 0%, #151718 100%); color: #a0aec0;
            border: 1px solid #000; border-top: 1px solid #4a5568; border-radius: 2px;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 4px 6px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.9);
            text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; position: relative;
        }
        .metal-nav-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: left 0.5s ease;
        }
        .metal-nav-btn:hover { 
            color: #00ffcc; transform: translateY(-2px); border-top: 1px solid #00ffcc; 
            background: linear-gradient(180deg, #3a4043 0%, #1a1c1d 100%);
            box-shadow: inset 0 1px 5px rgba(0, 255, 204, 0.2), 0 6px 12px rgba(0, 0, 0, 0.9), 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .metal-nav-btn:hover::after { left: 200%; }

        .footer-name { font-size: clamp(2rem, 4vw, 4rem); line-height: 1.05; margin: 0; }
        footer { font-size: 1.1rem; }
        footer p, footer a, footer span, footer h2, footer h3, footer div { font-size: 1.1rem; }
        footer .text-xs { font-size: 1rem; }
        
        /* Mobile Burger Menu & Overlay CSS */
        .nav-toggle {
            display: none; font-size: 1.5rem; color: #00ffcc;
            background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffcc;
            border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; line-height: 1;
        }
        .nav-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px); z-index: 49;
        }
        .nav-overlay.active { display: block; }

        @media (max-width: 1024px) {
            .footer-name { font-size: clamp(1.8rem, 5vw, 3.5rem); }
            #top-nav nav { gap: 0.5rem !important; }
            .metal-nav-btn { font-size: clamp(0.9rem, 2.2vw, 1.05rem); padding: 0.65rem 0.9rem; }
        }

        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            #top-nav .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; right: 0; 
                background: rgba(0, 0, 10, 0.95); backdrop-filter: blur(10px);
                flex-direction: column; align-items: center; padding: 2rem 0; 
                border-top: 1px solid #1a1f24; border-bottom: 2px solid #00ffcc;
                z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            }
            #top-nav .nav-links.open { display: flex !important; }
            .footer-name { font-size: clamp(1.8rem, 6vw, 3.3rem); }
            .metal-nav-btn { padding: 0.5rem 0.75rem; }
        }
        
        @media (min-width: 769px) {
            #top-nav .nav-links { display: contents; }
        }

        /* Page Transition Curtain */
        #page-transition-curtain {
            position: fixed; inset: 0; background-color: #00000A; z-index: 49; /* behind fixed nav z-50 */
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.17, 1); pointer-events: none;
        }
        .curtain-active { transform: translateY(0) !important; pointer-events: auto !important; }

        /* Perspective Footer Grid */
        .perspective-grid-footer {
            background-image: linear-gradient(transparent 95%, rgba(255, 204, 0, 0.7) 100%), linear-gradient(90deg, transparent 95%, rgba(255, 204, 0, 0.7) 100%);
            background-size: 80px 50px;
            transform: perspective(400px) rotateX(60deg) scaleY(1.5);
            transform-origin: bottom;
            -webkit-mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
            mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
        }
    </style>
</head>

    <script src="transition.js"></script>
    <script>
        function setFooterEyeTracking(e) {
            const pupilL = document.getElementById('footer-pupilL');
            const pupilR = document.getElementById('footer-pupilR');
            const highL = document.getElementById('footer-highL');
            const highR = document.getElementById('footer-highR');
            if (!pupilL || !pupilR || !highL || !highR) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 12;
            const y = (e.clientY / window.innerHeight - 0.5) * 12;
            const translate = `translate(${x}, ${y})`;
            pupilL.setAttribute('transform', translate);
            pupilR.setAttribute('transform', translate);
            highL.setAttribute('transform', translate);
            highR.setAttribute('transform', translate);
        }
        window.addEventListener('mousemove', setFooterEyeTracking);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) setFooterEyeTracking(e.touches[0]);
        }, { passive: true });
    </script>
    <script>
        (function setupBurgerMenu() {
            const navToggle = document.getElementById('nav-toggle');
            const navLinks = document.querySelector('#top-nav .nav-links');
            const navOverlay = document.getElementById('nav-overlay');
            if (!navToggle || !navLinks || !navOverlay) return;

            const closeMenu = () => {
                navLinks.classList.remove('open');
                navOverlay.classList.remove('active');
                navToggle.setAttribute('aria-expanded', 'false');
            };

            navToggle.addEventListener('click', () => {
                const isOpen = navLinks.classList.toggle('open');
                navOverlay.classList.toggle('active', isOpen);
                navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });

            navOverlay.addEventListener('click', closeMenu);
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) closeMenu();
            });

            document.querySelectorAll('#top-nav .nav-links a').forEach((link) => link.addEventListener('click', closeMenu));
        })();
    </script>
