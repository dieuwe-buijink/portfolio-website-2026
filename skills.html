<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Dieuwe Buijink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Press+Start+2P&display=swap');
        body { background-color: #00000A; color: white; margin: 0; font-family: 'Audiowide', sans-serif; }
        .font-audiowide { font-family: 'Audiowide', sans-serif; }
        .font-normal-sans { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        
        /* The "Slide in from bottom" entrance animation */
        #page-slide-wrapper {
            transform: translateY(100vh);
            animation: slideUpEnter 0.8s cubic-bezier(0.77, 0, 0.17, 1) forwards;
        }
        @keyframes slideUpEnter {
            to { transform: translateY(0); }
        }

        html { scroll-behavior: smooth; }

        /* Expanded Top Nav for Edge Alignment */
        header#top-nav {
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav .max-w-7xl {
            max-width: 100% !important;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        #top-nav nav {
            gap: 0.7rem !important;
        }

        /* Metallic Nav Buttons */
        .metal-nav-btn {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; letter-spacing: 0.05em;
            font-size: clamp(0.98rem, 1.8vw, 1.2rem);
            padding: 0.8rem 1rem;
            background: linear-gradient(180deg, #2a2d30 0%, #151718 100%); color: #a0aec0;
            border: 1px solid #000; border-top: 1px solid #4a5568; border-radius: 2px;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 4px 6px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.9);
            text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; position: relative;
        }
        .metal-nav-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: left 0.5s ease;
        }
        .metal-nav-btn:hover { 
            color: #00ffcc; transform: translateY(-2px); border-top: 1px solid #00ffcc; 
            background: linear-gradient(180deg, #3a4043 0%, #1a1c1d 100%);
            box-shadow: inset 0 1px 5px rgba(0, 255, 204, 0.2), 0 6px 12px rgba(0, 0, 0, 0.9), 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .metal-nav-btn:hover::after { left: 200%; }

        .footer-name { font-size: clamp(2rem, 4vw, 4rem); line-height: 1.05; margin: 0; }
        footer { font-size: 1.1rem; }
        footer p, footer a, footer span, footer h2, footer h3, footer div { font-size: 1.1rem; }
        footer .text-xs { font-size: 1rem; }
        
        /* Mobile Burger Menu & Overlay CSS */
        .nav-toggle {
            display: none; font-size: 1.5rem; color: #00ffcc;
            background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffcc;
            border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; line-height: 1;
        }
        .nav-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px); z-index: 49;
        }
        .nav-overlay.active { display: block; }

        @media (max-width: 1024px) {
            .footer-name { font-size: clamp(1.8rem, 5vw, 3.5rem); }
            #top-nav nav { gap: 0.5rem !important; }
            .metal-nav-btn { font-size: clamp(0.9rem, 2.2vw, 1.05rem); padding: 0.65rem 0.9rem; }
        }

        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            #top-nav .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; right: 0; 
                background: rgba(0, 0, 10, 0.95); backdrop-filter: blur(10px);
                flex-direction: column; align-items: center; padding: 2rem 0; 
                border-top: 1px solid #1a1f24; border-bottom: 2px solid #00ffcc;
                z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            }
            #top-nav .nav-links.open { display: flex !important; }
            .footer-name { font-size: clamp(1.8rem, 6vw, 3.3rem); }
            .metal-nav-btn { padding: 0.5rem 0.75rem; }
        }
        
        @media (min-width: 769px) {
            #top-nav .nav-links { display: contents; }
        }

        /* Page Transition Curtain */
        #page-transition-curtain {
            position: fixed; inset: 0; background-color: #00000A; z-index: 49;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.77, 0, 0.17, 1); pointer-events: none;
        }
        .curtain-active { transform: translateY(0) !important; pointer-events: auto !important; }

        /* Perspective Footer Grid */
        .perspective-grid-footer {
            background-image: linear-gradient(transparent 95%, rgba(255, 204, 0, 0.7) 100%), linear-gradient(90deg, transparent 95%, rgba(255, 204, 0, 0.7) 100%);
            background-size: 80px 50px;
            transform: perspective(400px) rotateX(60deg) scaleY(1.5);
            transform-origin: bottom;
            -webkit-mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
            mask-image: radial-gradient(120% 100% at bottom center, black 0%, transparent 100%);
        }

        /* --- NEW SKILLS CAROUSEL & MODAL STYLES --- */
        
        .carousel-wrapper {
            height: 85vh; /* Slightly longer */
            min-height: 650px; /* Slightly longer min-height */
            overflow: hidden;
            position: relative;
            /* Fade out edges for smoother infinite loop transition visually */
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .carousel-track {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            /* Width of each skill card column */
            width: 100%;
            max-width: 480px; 
        }

        .skill-card {
            position: relative;
            background: #d1d5db; /* Light grey base per wireframe */
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid transparent;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .skill-card:hover {
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.4), inset 0 0 15px rgba(0, 255, 204, 0.2);
            border-color: #00ffcc;
            z-index: 20;
        }

        .skill-card img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .skill-card:hover img {
            opacity: 0.3;
        }

        .skill-card-text {
            position: relative;
            z-index: 10;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            font-weight: bold;
            font-size: 1.75rem; 
            color: #111827; /* Dark text on light background */
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 0.75rem 1.5rem; 
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .skill-card:hover .skill-card-text {
            background: #00ffcc;
            color: #00000A;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Animations */
        /* Shift by the exact pixel amount calculated in JS to prevent stutter */
        .track-down {
            animation: scrollDown 18s linear infinite; 
        }
        .track-up {
            animation: scrollUp 18s linear infinite; 
        }

        @keyframes scrollDown {
            0% { transform: translateY(var(--shift-amount, -1168px)); }
            100% { transform: translateY(0); }
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(var(--shift-amount, -1168px)); }
        }

        /* Modal Styles matching wireframe */
        #skill-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 10, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        #skill-modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content-box {
            background-color: #e2e8f0; /* Light grey from wireframe */
            border: 4px solid #7c3aed; /* Purple border from wireframe */
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            color: #1a202c;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-scroll-area {
            padding: 2.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Custom Scrollbar for Modal */
        .modal-scroll-area::-webkit-scrollbar {
            width: 10px;
        }
        .modal-scroll-area::-webkit-scrollbar-track {
            background: #cbd5e1;
            border-radius: 0 8px 8px 0;
        }
        .modal-scroll-area::-webkit-scrollbar-thumb {
            background: #1a202c;
            border-radius: 5px;
            border: 2px solid #cbd5e1;
        }

        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            color: #1a202c;
            cursor: pointer;
            z-index: 10;
            line-height: 1;
            transition: color 0.2s;
        }
        .modal-close-btn:hover {
            color: #7c3aed;
        }

        .modal-media-placeholder {
            width: 100%;
            height: 300px;
            background-color: #71717a; /* Darker grey box from wireframe */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            border-radius: 4px;
        }

        .modal-small-media {
            width: 100%;
            max-width: 300px;
            height: 200px;
            background-color: #71717a;
            align-self: flex-end;
            border-radius: 4px;
        }
    </style>
</head>

    <script>
        // --- SKILLS DATA & LOGIC ---

        const skillsData = [
            { id: 1, name: "Website development", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80&w=400", desc1: "Extensive experience in creating responsive, dynamic web applications.", desc2: "Focused on clean code architecture and performance optimization." },

            { id: 4, name: "UI / UX design", img: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&q=80&w=400", desc1: "Designing intuitive user interfaces with a strong emphasis on user experience.", desc2: "Bridging the gap between design and technical execution." },
            { id: 5, name: "Photography", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=400", desc1: "Capturing high-quality images and moments.", desc2: "Editing and color grading for the perfect aesthetic." },
            { id: 6, name: "Media marketing", img: "https://images.unsplash.com/photo-1432888498266-38ffec3eaf0a?auto=format&fit=crop&q=80&w=400", desc1: "Creating and executing digital marketing campaigns.", desc2: "Analyzing engagement metrics and driving growth." },
            { id: 7, name: "Language & culture", img: "https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=400", desc1: "Understanding and bridging cultural nuances.", desc2: "Applying linguistic skills to diverse projects." },
            { id: 8, name: "Git and Scrum", img: "https://images.unsplash.com/photo-1556075798-4825dfaaf498?auto=format&fit=crop&q=80&w=400", desc1: "Proficient in version control using Git.", desc2: "Working effectively in Agile/Scrum environments." }
        ];

        function createSkillCard(skill) {
            const card = document.createElement('div');
            card.className = 'skill-card';
            card.onclick = () => openModal(skill);

            // Using placeholder image if desired, or skill.img
            card.innerHTML = `
                <img src="${skill.img}" alt="${skill.name}">
                <div class="skill-card-text">${skill.name}</div>
            `;
            return card;
        }

        function initCarousels() {
            const trackDown = document.getElementById('track-down');
            const trackUp = document.getElementById('track-up');

            // Split skills into two groups for the two columns
            const half = Math.ceil(skillsData.length / 2);
            const col1Data = skillsData.slice(0, half);
            const col2Data = skillsData.slice(half);

            // Function to populate a track. 
            // We append the data 4 times to ensure there's enough content to cover large screens 
            // and prevent blank spaces at the end of the loop causing a reset stutter.
            const populateTrack = (track, data) => {
                for (let i = 0; i < 4; i++) { 
                    data.forEach(skill => {
                        track.appendChild(createSkillCard(skill));
                    });
                }
                
                // Calculate exactly how far one set of items spans so we can shift perfectly
                // Card height is 260px, flex gap is 2rem.
                const remValue = parseFloat(getComputedStyle(document.documentElement).fontSize);
                const gapSize = 2 * remValue;
                const singleSetHeight = data.length * 260 + data.length * gapSize;
                track.style.setProperty('--shift-amount', `-${singleSetHeight}px`);
            };

            populateTrack(trackDown, col1Data);
            populateTrack(trackUp, col2Data);

            // Populate List View Container
            const viewList = document.getElementById('view-list');
            skillsData.forEach(skill => {
                viewList.appendChild(createSkillCard(skill));
            });

            // Initialize View Toggle functionality
            setupViewToggles();
        }

        function setupViewToggles() {
            const btnSlider = document.getElementById('toggle-slider');
            const btnList = document.getElementById('toggle-list');
            const viewSlider = document.getElementById('view-slider');
            const viewList = document.getElementById('view-list');

            btnSlider.addEventListener('click', () => {
                // Show Slider, Hide List
                viewSlider.classList.remove('hidden');
                viewSlider.classList.add('flex');
                viewList.classList.remove('grid');
                viewList.classList.add('hidden');
                
                // Update active states on text
                btnSlider.className = "cursor-pointer text-[#00ffcc] transition-colors";
                btnList.className = "cursor-pointer text-gray-500 hover:text-white transition-colors";
            });

            btnList.addEventListener('click', () => {
                // Show List, Hide Slider
                viewSlider.classList.remove('flex');
                viewSlider.classList.add('hidden');
                viewList.classList.remove('hidden');
                viewList.classList.add('grid');
                
                // Update active states on text
                btnList.className = "cursor-pointer text-[#00ffcc] transition-colors";
                btnSlider.className = "cursor-pointer text-gray-500 hover:text-white transition-colors";
            });
        }

        // Modal Logic
        const modalOverlay = document.getElementById('skill-modal-overlay');
        const closeModalBtn = document.getElementById('close-modal');

        function openModal(skill) {
            document.getElementById('modal-title').innerText = skill.name;
            document.getElementById('modal-desc-1').innerText = skill.desc1;
            document.getElementById('modal-desc-2').innerText = skill.desc2;
            
            modalOverlay.classList.add('active');
            // Prevent background scrolling when modal is open
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            // Restore background scrolling
            document.body.style.overflow = ''; 
        }

        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initCarousels);


        // --- FOOTER & NAV LOGIC (Preserved from original code) ---

        function setFooterEyeTracking(e) {
            const pupilL = document.getElementById('footer-pupilL');
            const pupilR = document.getElementById('footer-pupilR');
            const highL = document.getElementById('footer-highL');
            const highR = document.getElementById('footer-highR');
            if (!pupilL || !pupilR || !highL || !highR) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 12;
            const y = (e.clientY / window.innerHeight - 0.5) * 12;
            const translate = `translate(${x}, ${y})`;
            pupilL.setAttribute('transform', translate);
            pupilR.setAttribute('transform', translate);
            highL.setAttribute('transform', translate);
            highR.setAttribute('transform', translate);
        }
        window.addEventListener('mousemove', setFooterEyeTracking);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) setFooterEyeTracking(e.touches[0]);
        }, { passive: true });

        (function setupBurgerMenu() {
            const navToggle = document.getElementById('nav-toggle');
            const navLinks = document.querySelector('#top-nav .nav-links');
            const navOverlay = document.getElementById('nav-overlay');
            if (!navToggle || !navLinks || !navOverlay) return;

            const closeMenu = () => {
                navLinks.classList.remove('open');
                navOverlay.classList.remove('active');
                navToggle.setAttribute('aria-expanded', 'false');
            };

            navToggle.addEventListener('click', () => {
                const isOpen = navLinks.classList.toggle('open');
                navOverlay.classList.toggle('active', isOpen);
                navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });

            navOverlay.addEventListener('click', closeMenu);
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) closeMenu();
            });

            document.querySelectorAll('#top-nav .nav-links a').forEach((link) => link.addEventListener('click', closeMenu));
        })();
    </script>
</body>
</html>
